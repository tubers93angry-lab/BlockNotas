<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockNotas</title>
    <style>
        :root {
            --bg-color: #081c15;
            --sidebar-bg: #1b4332;
            --editor-bg: #2d6a4f;
            --primary-color: #4ade80;
            --primary-hover: #22c55e;
            --text-light: #d8f3dc;
            --text-dark: #081c15;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN --- */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background-color: var(--sidebar-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--editor-bg);
        }

        .login-box h1 { color: var(--primary-color); margin-bottom: 20px; }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid var(--editor-bg);
            background-color: var(--bg-color);
            color: var(--text-light);
            outline: none;
        }

        .login-box input:focus { border-color: var(--primary-color); }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-dark);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .login-btn:hover { background-color: var(--primary-hover); }
        
        .toggle-login {
            color: #a3b18a;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: underline;
        }

        /* --- INTERFACE DO APP (Oculta inicialmente) --- */
        #appInterface {
            display: none; /* Só aparece após o login */
            width: 100%;
            height: 100%;
        }

        /* Barra Lateral */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid var(--editor-bg);
            display: flex; flex-direction: column;
        }

        .sidebar-header {
            padding: 20px; background-color: var(--editor-bg);
            text-align: center; border-bottom: 2px solid var(--primary-color);
        }
        .sidebar-header h1 { font-size: 1.5rem; color: var(--primary-color); }

        .new-note-btn {
            margin: 15px; background-color: var(--primary-color); color: var(--text-dark);
            border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .notes-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .note-item {
            background-color: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 6px;
            margin-bottom: 8px; cursor: pointer; border-left: 4px solid transparent;
        }
        .note-item.active { border-left-color: var(--primary-color); background-color: rgba(255, 255, 255, 0.15); }
        .note-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-date { font-size: 0.75rem; color: #a3b18a; }

        /* Área Principal */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background-color: var(--bg-color); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: var(--editor-bg); }
        .toolbar { display: flex; gap: 10px; }
        
        button { background-color: var(--primary-color); color: var(--text-dark); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button.btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); }
        
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name-display { font-weight: bold; color: var(--primary-color); }

        .editor-area { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        textarea { width: 100%; flex-grow: 1; background-color: transparent; color: var(--text-light); border: none; font-size: 1.1rem; line-height: 1.6; resize: none; outline: none; }
        
        .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; background-color: var(--sidebar-bg); font-size: 0.85rem; color: #a3b18a; }
        
        .notification { position: fixed; bottom: 20px; right: 20px; background-color: var(--primary-color); color: var(--text-dark); padding: 15px 25px; border-radius: 8px; font-weight: bold; transform: translateX(150%); transition: 0.3s ease; }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>📝 BlockNotas</h1>
            <h3 id="formTitle" style="margin-bottom: 15px; color: var(--text-light);">Entrar</h3>
            
            <input type="text" id="usernameInput" placeholder="Nome de usuário">
            <input type="password" id="passwordInput" placeholder="Senha">
            
            <button class="login-btn" id="actionBtn" onclick="handleLogin()">Entrar</button>
            <p class="toggle-login" id="toggleMode" onclick="toggleLoginMode()">Não tem conta? Crie uma aqui.</p>
            <p id="loginError" style="color: var(--danger); margin-top: 10px; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>

    <!-- INTERFACE DO APLICATIVO -->
    <div id="appInterface">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📝 BlockNotas</h1>
            </div>
            <button class="new-note-btn" onclick="createNewNote()">+ Nova Nota</button>
            <div class="notes-list" id="notesList"></div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="toolbar">
                    <button onclick="downloadNote()">📥 Baixar .txt</button>
                    <button onclick="deleteCurrentNote()" class="btn-danger">🗑️ Apagar Nota</button>
                </div>
                <div class="user-info">
                    <span class="user-name-display" id="displayUserName">Usuário</span>
                    <button onclick="logout()" class="btn-danger" style="padding: 5px 10px; font-size: 0.8rem;">Sair</button>
                </div>
            </div>

            <div class="editor-area">
                <textarea id="noteInput" placeholder="Selecione uma nota ou crie uma nova..."></textarea>
            </div>

            <div class="status-bar">
                <span id="saveStatus">Salvamento automático ativado</span>
                <div><span id="wordCount">0</span> Palavras | <span id="charCount">0</span> Caracteres</div>
            </div>
        </div>
    </div>

    <div id="toast" class="notification">Ação realizada!</div>

    <script>
        // --- SISTEMA DE LOGIN LOCAL ---
        let isRegisterMode = false;
        let currentUser = null;

        function toggleLoginMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('formTitle').textContent = isRegisterMode ? 'Criar Conta' : 'Entrar';
            document.getElementById('actionBtn').textContent = isRegisterMode ? 'Cadastrar' : 'Entrar';
            document.getElementById('toggleMode').textContent = isRegisterMode ? 'Já tem conta? Entre aqui.' : 'Não tem conta? Crie uma aqui.';
            document.getElementById('loginError').style.display = 'none';
        }

        function handleLogin() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('loginError');

            if (!user || !pass) {
                errorMsg.textContent = "Preencha todos os campos!";
                errorMsg.style.display = 'block';
                return;
            }

            if (isRegisterMode) {
                // Cadastro
                if (localStorage.getItem('user_' + user)) {
                    errorMsg.textContent = "Este usuário já existe!";
                    errorMsg.style.display = 'block';
                } else {
                    localStorage.setItem('user_' + user, pass);
                    // Cria um espaço de notas vazio para o novo usuário
                    localStorage.setItem('notes_' + user, JSON.stringify([]));
                    startApp(user);
                }
            } else {
                // Login
                const savedPass = localStorage.getItem('user_' + user);
                if (savedPass && savedPass === pass) {
                    startApp(user);
                } else {
                    errorMsg.textContent = "Usuário ou senha incorretos!";
                    errorMsg.style.display = 'block';
                }
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('appInterface').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        function startApp(username) {
            currentUser = username;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appInterface').style.display = 'flex';
            document.getElementById('displayUserName').textContent = username;
            
            // Carrega as notas específicas deste usuário
            loadUserNotes();
        }

        // --- GERENCIAMENTO DE NOTAS (Por Usuário) ---
        let notes = [];
        let currentNoteId = null;
        const noteInput = document.getElementById('noteInput');
        const notesList = document.getElementById('notesList');

        function loadUserNotes() {
            notes = JSON.parse(localStorage.getItem('notes_' + currentUser)) || [];
            if (notes.length === 0) createNewNote();
            else { renderNotesList(); loadNote(notes[0].id); }
        }

        function saveToStorage() {
            if (currentUser) {
                localStorage.setItem('notes_' + currentUser, JSON.stringify(notes));
            }
        }

        function createNewNote() {
            const newNote = { id: Date.now().toString(), content: '', date: new Date().toLocaleString() };
            notes.unshift(newNote);
            saveToStorage();
            renderNotesList();
            loadNote(newNote.id);
        }

        function renderNotesList() {
            notesList.innerHTML = '';
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                div.onclick = () => loadNote(note.id);
                const title = note.content.trim().split('\n')[0] || 'Nova Nota Vazia';
                div.innerHTML = `<div class="note-title">${title.substring(0, 30)}</div><div class="note-date">${note.date}</div>`;
                notesList.appendChild(div);
            });
        }

        function loadNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            noteInput.value = note ? note.content : '';
            noteInput.disabled = false;
            renderNotesList();
            updateCounters();
        }

        noteInput.addEventListener('input', () => {
            if (!currentNoteId) return;
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].content = noteInput.value;
                notes[noteIndex].date = new Date().toLocaleString();
                saveToStorage();
                renderNotesList();
                updateCounters();
            }
        });

        function deleteCurrentNote() {
            if (notes.length === 0) return;
            if (confirm('Apagar esta nota permanentemente?')) {
                notes = notes.filter(n => n.id !== currentNoteId);
                saveToStorage();
                if (notes.length > 0) loadNote(notes[0].id);
                else { noteInput.value = ''; noteInput.disabled = true; currentNoteId = null; renderNotesList(); }
                showNotification('Nota apagada! 🗑️');
            }
        }

        function downloadNote() {
            const text = noteInput.value;
            if (text.trim() === '') { showNotification('A nota está vazia!'); return; }
            let fileName = prompt("Digite o nome do arquivo:", "Minha_Anotacao");
            if (fileName === null || fileName.trim() === "") return;
            
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = `${fileName}.txt`;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
            showNotification('Download concluído! 📥');
        }

        function updateCounters() {
            const text = noteInput.value;
            document.getElementById('charCount').textContent = text.length;
            const words = text.trim().split(/\s+/);
            document.getElementById('wordCount').textContent = text.trim() === '' ? 0 : words.length;
        }

        function showNotification(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
